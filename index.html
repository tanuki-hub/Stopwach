<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stopwatch + Counter</title>
  <style>
    body {
      margin: 0;
      background: #121212;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      font-family: Arial;
      user-select: none;
    }

    .time {
      font-size: 8vw;
    }

    .counter {
      font-size: 4vw;
      margin-top: 20px;
    }

    .light-mode {
      background: white;
      color: black;
    }
  </style>
</head>
<body>

<div class="time" id="time">00:00:00.000</div>
<div class="counter" id="counter">0</div>

<script>
const timeEl = document.getElementById("time");
const counterEl = document.getElementById("counter");

let startTime = null;
let elapsed = 0;
let running = false;
let raf = null;

// ⭐ カウンター
let counter = 0;

// スワイプ用
let startX = 0;
let startY = 0;
let isSwipe = false;

function updateDisplay() {
  const ms = Math.floor(elapsed % 1000);
  const sec = Math.floor(elapsed / 1000) % 60;
  const min = Math.floor(elapsed / 60000) % 60;
  const hr = Math.floor(elapsed / 3600000);

  timeEl.textContent =
    `${String(hr).padStart(2,"0")}:` +
    `${String(min).padStart(2,"0")}:` +
    `${String(sec).padStart(2,"0")}.` +
    `${String(ms).padStart(3,"0")}`;

  counterEl.textContent = counter;
}

function loop() {
  if (running) {
    elapsed = performance.now() - startTime;
    updateDisplay();
    raf = requestAnimationFrame(loop);
  }
}

function toggle() {
  if (running) {
    cancelAnimationFrame(raf);
    running = false;
  } else {
    startTime = performance.now() - elapsed;
    running = true;
    loop();
  }
}

function reset() {
  cancelAnimationFrame(raf);
  elapsed = 0;
  running = false;
  counter = 0; // ⭐ カウンターもリセット
  updateDisplay();
}

// -------- スワイプ --------
function startSwipe(e) {
  isSwipe = false;
  const t = e.touches ? e.touches[0] : e;
  startX = t.clientX;
  startY = t.clientY;
}

function endSwipe(e) {
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;

  const absX = Math.abs(dx);
  const absY = Math.abs(dy);

  // しきい値
  if (Math.max(absX, absY) < 50) return;

  isSwipe = true;

  if (absX > absY) {
    // 👉 横スワイプ → リセット
    reset();
  } else {
    if (dy < 0) {
      // ⬆ 上スワイプ
      counter++;
    } else {
      // ⬇ 下スワイプ
      counter--;
    }
    updateDisplay();
  }
}

// イベント
document.body.addEventListener("click", () => {
  if (!isSwipe) toggle();
});

document.body.addEventListener("touchstart", startSwipe);
document.body.addEventListener("touchend", endSwipe);
document.body.addEventListener("mousedown", startSwipe);
document.body.addEventListener("mouseup", endSwipe);

updateDisplay();
</script>

</body>
</html>
